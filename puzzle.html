<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PuzzleWish Puzzle</title>
<link rel="icon" type="image/png" href="Assets/Images/favicon.png">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <div class="logo">
        PuzzleWish
    </div>

    <h1 class="heading">
        Your Surprise Is Waiting...
    </h1>

    <p class="description">
        <span class="bold-text">
        Take your time and enjoy solving the puzzle. Your surprise is waiting on the other side. 💜</span>
    </p>
<p class="instruction">
    💡 After completing the puzzle, click <strong>"I've Solved It!"</strong> to continue.
</p>
    <iframe
        src="https://www.jigsawplanet.com/?rc=play&amp;pid=209ec1237a44&amp;view=iframe"
        style="width:100%; height:600px; border:none; border-radius:15px;">
    </iframe>

    <a href="#" id="finishButton" class="button" onclick="showRevealButton(); return false;">
I've Solved It!
</a>


<p id="successMessage" class="success-message">
✨ Congratulations!

You've unlocked your surprise.
</p>
</div>

<script>
function showRevealButton() {

    const finishBtn = document.getElementById("finishButton");
    const success = document.getElementById("successMessage");

    // Hide finish button
    finishBtn.style.display = "none";

    // Show success message
    success.style.display = "block";

    // Initial message
    success.innerHTML = `
        <div style="font-size:30px;">✨</div>

        <div style="margin-top:10px;font-size:24px;font-weight:700;">
            Congratulations!
        </div>

        <div style="margin-top:15px;font-size:18px;">
            You've unlocked your surprise.
        </div>

        <div style="margin-top:20px;color:#777;font-size:16px;">
            Preparing your surprise<span id="loadingDots"></span>
        </div>
    `;

    // Animate dots
    let dots = 0;

    const dotInterval = setInterval(function () {

        dots = (dots + 1) % 4;

        document.getElementById("loadingDots").textContent = ".".repeat(dots);

    }, 400);

    // Open reveal page after 2.5 seconds
    setTimeout(function () {

        clearInterval(dotInterval);

        window.location.href = "reveal.html";

    }, 2500);

}
</script>
</body>

</html>
